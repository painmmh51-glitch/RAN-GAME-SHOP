<!DOCTYPE html>
<html>
<head>
    <title>RAN GAME SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; color: #333; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h2 { text-align: center; color: #0088cc; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0088cc; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { background: #0077b5; }
    </style>
</head>
<body>
    <div class="card">
        <h2>RAN GAME SHOP</h2>
        <label>ဂိမ်းအမျိုးအစား ရွေးပါ</label>
        <select id="game">
            <option value="MLBB">Mobile Legends (Diamond)</option>
            <option value="PUBG">PUBG Mobile (UC)</option>
        </select>
        
        <label>Player ID (e.g. 12345678)</label>
        <input type="text" id="gameid" placeholder="ID ရိုက်ထည့်ပါ">
        
        <label>ပမာဏ (Diamonds/UC)</label>
        <input type="number" id="amount" placeholder="အရေအတွက် ရိုက်ထည့်ပါ">
        
        <button id="orderBtn">ORDER NOW</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        document.getElementById('orderBtn').addEventListener('click', () => {
            const game = document.getElementById('game').value;
            const id = document.getElementById('gameid').value;
            const amount = document.getElementById('amount').value;

            if(!id || !amount) {
                alert("အချက်အလက် ပြည့်စုံအောင် ဖြည့်ပေးပါ");
                return;
            }

            const data = { game, id, amount };
            tg.sendData(JSON.stringify(data));
            tg.close();
        });
    </script>
</body>
</html>
